[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glyph-forge-engine"
version = "0.1.0"
description = "Python SVG renderer + broken-glyph QA engine feeding the studio audit UI."
readme = "README.md"
requires-python = ">=3.11"
# numpy/Pillow/scipy are imported by the engine's own modules (score_glyph,
# render pipeline) — declared here rather than inherited transitively through
# variable-gen, so a variable-gen dependency change can't break this package.
dependencies = ["variable-gen", "numpy>=1.26", "pillow>=10", "scipy>=1.11"]

[project.optional-dependencies]
test = ["pytest"]

# The modules in python/ import each other as flat top-level names
# (`from shared import ...`, `from score_glyph import ...`) and resolve
# `PACKAGE_ROOT`/`REPO_ROOT` via `Path(__file__).parents[...]`. Moving the
# files would break both the flat imports and those path anchors, and the
# scripts are invoked directly (see package.json + cli/src/stages.ts) as
# `python python/<script>.py`. So we keep python/ in place and force-include
# it into the wheel under the `glyph_forge` import name — installable and in
# the uv workspace without disturbing any existing invocation path.
[tool.hatch.build.targets.wheel]
force-include = { "python" = "glyph_forge" }
