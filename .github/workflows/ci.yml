name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Require a changeset on PRs
        # Skip the changesets bot's own "Version Packages" PR: it consumes the
        # pending changeset by design, so requiring one there always fails.
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: npx changeset status --since origin/main
      - run: npm run check
      - run: npm run typecheck
      - run: npm run test
      # Build the published package. The studio app is a repo-only dev tool
      # (not shipped); it is covered by typecheck above, not a prod build here.
      - run: npx turbo build --filter=static-to-variable

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # Lint everything; format-check the durable library and tests. The
      # remaining legacy-styled modules (audit script, glyph-forge python/) are
      # style-relaxed via ruff per-file-ignores but still pyflakes-checked.
      - name: Lint (ruff)
        run: |
          uvx ruff@0.14 check packages/variable-gen packages/glyph-forge-engine
          uvx ruff@0.14 format --check packages/variable-gen/src packages/variable-gen/tests packages/glyph-forge-engine/tests
      - name: Typecheck (mypy)
        run: uv run mypy
      - name: Test (pytest)
        run: uv run pytest

  # Prove the published CLI works end to end: build a real variable font from
  # the committed minimal example (32K Inter subset donors — seconds, not
  # minutes), and verify the packaging path produces an intact bundled engine.
  e2e:
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: npm ci
      - run: uv sync
      - run: npx turbo build --filter=static-to-variable
      - name: Build the minimal example font
        run: node packages/cli/dist/cli.js build --config examples/minimal/stv.config.json --json > build-summary.json
      # The parse itself is the real assertion: if any engine/stage output
      # leaked onto stdout, build-summary.json would not be valid JSON.
      - name: Assert the build summary and font output
        run: |
          node -e "
            const s = require('./build-summary.json');
            if (!s.ok || s.family !== 'STV Minimal' || s.steps.length !== 3) {
              console.error(s);
              process.exit(1);
            }
          "
          test -f examples/minimal/build/minimal-vf.ttf
      - name: Doctor reports a usable environment
        run: node packages/cli/dist/cli.js doctor --json | node -e "let d=''; process.stdin.on('data', c => d += c).on('end', () => { const r = JSON.parse(d); if (!r.usable) { console.error(r); process.exit(1); } });"
      # The fixture's _expect annotation would trip strict validation on its
      # own, so also assert the intended unknown key is what gets named.
      - name: Invalid configs fail fast with exit 2
        run: |
          set +e
          stderr=$(node packages/cli/dist/cli.js build --config schemas/fixtures/invalid/unknown-top-level-key.json 2>&1 >/dev/null)
          code=$?
          set -e
          test "$code" -eq 2
          echo "$stderr" | grep -q buildCache
      - name: Bundle the engine for packaging
        run: |
          node packages/cli/scripts/bundle-engine.mjs
          test -f packages/cli/engine/variable-gen/pyproject.toml
          test -f packages/cli/engine/glyph-forge-engine/pyproject.toml
          test -f packages/cli/skills/static-to-variable/SKILL.md
